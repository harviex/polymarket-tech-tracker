<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科学预测事件追踪器 | Science Prediction Tracker</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, "Microsoft YaHei", "Segoe UI", sans-serif; background: #0f1419; color: #e7e9ea; }
        
        .container { max-width: 1400px; margin:0 auto; padding:20px; }
        
        /* Header */
        .header { text-align:center; padding:40px 20px; }
        .header h1 { font-size:36px; font-weight:800; margin-bottom:12px; background: linear-gradient(135deg, #1d9bf0, #f91880); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .header p { font-size:16px; color:#8b98a5; max-width:600px; margin:0 auto; line-height:1.6; }
        
        /* Stats Bar */
        .stats-bar { display:flex; justify-content:center; gap:32px; margin:30px 0; flex-wrap:wrap; }
        .stat-item { text-align:center; }
        .stat-num { font-size:32px; font-weight:800; color:#1d9bf0; display:block; }
        .stat-label { font-size:13px; color:#8b98a5; }
        
        /* Filters */
        .filters { display:flex; gap:16px; margin-bottom:30px; flex-wrap:wrap; justify-content:center; align-items:center; }
        .filter-group { display:flex; align-items:center; gap:8px; }
        .filter-group label { font-size:14px; color:#8b98a5; }
        .filter-group select { background:#1e2732; color:#e7e9ea; border:1px solid #38444d; border-radius:8px; padding:8px 16px; font-size:14px; outline:none; cursor:pointer; }
        .filter-group select:focus { border-color:#1d9bf0; }
        .search-box { flex:1; max-width:400px; position:relative; }
        .search-box input { width:100%; padding:10px 16px 10px 40px; background:#1e2732; border:1px solid #38444d; border-radius:8px; color:#e7e9ea; font-size:14px; outline:none; }
        .search-box input:focus { border-color:#1d9bf0; }
        .search-box::before { content:"🔍"; position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:14px; }
        .sort-btn { background:#1e2732; border:1px solid #38444d; color:#e7e9ea; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:14px; transition:all .2s; }
        .sort-btn:hover { background:#2a3a4a; border-color:#1d9bf0; }
        .sort-btn.active { background:#1d9bf0; border-color:#1d9bf0; }
        
        /* Event Grid */
        .event-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(350px, 1fr)); gap:20px; margin-bottom:40px; }
        
        /* Event Card */
        .event-card { background:#1e2732; border-radius:16px; padding:24px; cursor:pointer; transition:all .3s; border:1px solid transparent; position:relative; overflow:hidden; }
        .event-card:hover { transform:translateY(-4px); border-color:#1d9bf0; box-shadow:0 8px 24px rgba(29,155,240,.15); }
        .event-card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, #1d9bf0, #f91880); }
        .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
        .card-title { font-size:16px; font-weight:700; line-height:1.4; flex:1; margin-right:12px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .card-badge { background:#f91880; color:#fff; padding:4px 10px; border-radius:12px; font-size:11px; font-weight:700; white-space:nowrap; }
        .card-market { margin-bottom:16px; }
        .market-question { font-size:14px; color:#8b98a5; margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .probability-bar { height:24px; background:#15202b; border-radius:12px; overflow:hidden; position:relative; }
        .probability-fill { height:100%; background:linear-gradient(90deg, #1d9bf0, #0d8bd9); border-radius:12px; transition:width .5s; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; }
        .probability-text { font-size:12px; font-weight:700; color:#fff; }
        .card-footer { display:flex; justify-content:space-between; align-items:center; font-size:13px; color:#8b98a5; }
        .volume { display:flex; align-items:center; gap:4px; }
        .volume::before { content:"💰"; }
        .date { display:flex; align-items:center; gap:4px; }
        .date::before { content:"📅"; }
        .card-link { position:absolute; top:0; left:0; right:0; bottom:0; z-index:1; }
        
        /* Loading */
        .loading { text-align:center; padding:60px; color:#8b98a5; font-size:16px; }
        .loading::after { content:''; display:inline-block; width:20px; height:20px; border:2px solid #1d9bf0; border-radius:50%; border-top-color:transparent; animation:spin 1s linear infinite; margin-left:8px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        
        /* Footer */
        .footer { text-align:center; padding:40px; color:#8b98a5; font-size:13px; border-top:1px solid #38444d; }
        .footer a { color:#1d9bf0; text-decoration:none; }
        .footer a:hover { text-decoration:underline; }
        
        /* Theme toggle */
        .theme-toggle { position:fixed; top:20px; right:20px; z-index:100; }
        .theme-btn { background:#1e2732; border:1px solid #38444d; color:#e7e9ea; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:14px; }
        .theme-btn:hover { background:#2a3a4a; }
        
        body.light-theme { background:#f5f5f5; color:#333; }
        body.light-theme .header p { color:#666; }
        body.light-theme .stat-num { color:#4a90e2; }
        body.light-theme .stat-label { color:#666; }
        body.light-theme .event-card { background:#fff; border-color:#e0e0e0; }
        body.light-theme .card-question { color:#666; }
        body.light-theme .card-footer { color:#666; }
        body.light-theme .probability-bar { background:#e0e0e0; }
        body.light-theme .footer { color:#666; border-color:#e0e0e0; }
        body.light-theme .theme-btn { background:#fff; color:#333; border-color:#e0e0e0; }
        body.light-theme .sort-btn { background:#fff; color:#333; border-color:#e0e0e0; }
        body.light-theme .sort-btn.active { background:#4a90e2; color:#fff; border-color:#4a90e2; }
        body.light-theme .search-box input { background:#fff; color:#333; border-color:#e0e0e0; }
        body.light-theme .filter-group select { background:#fff; color:#333; border-color:#e0e0e0; }
        
        /* Responsive */
        @media (max-width:768px) {
            .container { padding:12px; }
            .header h1 { font-size:28px; }
            .event-grid { grid-template-columns:1fr; }
            .stats-bar { gap:20px; }
            .stat-num { font-size:24px; }
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>🔬 科学预测事件追踪器</h1>
            <p>实时追踪 Polymarket 上与科学相关的预测事件，结合新闻数据提供智能分析</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-num" id="totalEvents">-</span>
                <span class="stat-label">总事件数</span>
            </div>
            <div class="stat-item">
                <span class="stat-num" id="totalMarkets">-</span>
                <span class="stat-label">总市场数</span>
            </div>
            <div class="stat-item">
                <span class="stat-num" id="totalVolume">-</span>
                <span class="stat-label">总交易量</span>
            </div>
            <div class="stat-item">
                <span class="stat-num" id="lastUpdated">-</span>
                <span class="stat-label">最后更新</span>
            </div>
        </div>
        
        <div class="filters">
            <div class="filter-group">
                <label>排序：</label>
                <button class="sort-btn active" data-sort="volume" onclick="changeSort('volume')">交易量</button>
                <button class="sort-btn" data-sort="probability" onclick="changeSort('probability')">概率</button>
                <button class="sort-btn" data-sort="date" onclick="changeSort('date')">时间</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索事件..." oninput="filterEvents()">
            </div>
        </div>
        
        <div class="event-grid" id="eventGrid">
            <div class="loading">加载中...</div>
        </div>
        
        <div class="footer">
            <p>数据来源：<a href="https://polymarket.com" target="_blank">Polymarket</a> | 最后更新：<span id="updateTime">-</span></p>
            <p>💡 点击卡片查看详情，包括相关新闻和预测分析</p>
            <p style="margin-top:12px;"><a href="https://github.com/harviex/polymarket-tech-tracker" target="_blank">GitHub 仓库</a> | 基于 china-prediction-tracker 改进</p>
        </div>
    </div>
    
    <script>
        let allEvents = [];
        let currentSort = 'volume';
        
        // 主题切换
        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-btn');
            if (body.classList.contains('light-theme')) {
                body.classList.remove('light-theme');
                btn.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light-theme');
                btn.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }
        
        // 初始化主题
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
            document.querySelector('.theme-btn').textContent = '☀️';
        }
        
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data/events.json?t=' + new Date().getTime());
                const data = await response.json();
                
                allEvents = data.events || [];
                document.getElementById('totalEvents').textContent = data.total_events || allEvents.length;
                document.getElementById('lastUpdated').textContent = (data.last_updated || '').split(' ')[0] || '-';
                
                // 计算总市场数和交易量
                let totalMarkets = 0;
                let totalVolume = 0;
                allEvents.forEach(event => {
                    totalMarkets += event.markets ? event.markets.length : 0;
                    totalVolume += event.volume || 0;
                });
                document.getElementById('totalMarkets').textContent = totalMarkets.toLocaleString();
                document.getElementById('totalVolume').textContent = '$' + formatNumber(totalVolume);
                document.getElementById('updateTime').textContent = data.last_updated || '-';
                
                renderEvents();
            } catch (err) {
                console.error('加载数据失败:', err);
                document.getElementById('eventGrid').innerHTML = '<div class="loading">❌ 加载失败，请刷新重试</div>';
            }
        }
        
        // 格式化数字
        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toFixed(0);
        }
        
        // 渲染事件卡片
        function renderEvents() {
            const grid = document.getElementById('eventGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allEvents.filter(event => {
                if (!search) return true;
                return event.title.toLowerCase().includes(search) || 
                       event.markets.some(m => m.question.toLowerCase().includes(search));
            });
            
            // 排序
            filtered.sort((a, b) => {
                if (currentSort === 'volume') return (b.volume || 0) - (a.volume || 0);
                if (currentSort === 'probability') {
                    const probA = a.markets && a.markets[0] ? a.markets[0].probability : 0;
                    const probB = b.markets && b.markets[0] ? b.markets[0].probability : 0;
                    return probB - probA;
                }
                if (currentSort === 'date') {
                    const dateA = new Date(a.updated_at || a.created_at || 0);
                    const dateB = new Date(b.updated_at || b.created_at || 0);
                    return dateB - dateA;
                }
                return 0;
            });
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="loading">没有找到匹配的事件</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(event => {
                const firstMarket = event.markets && event.markets[0];
                const probability = firstMarket ? firstMarket.probability : 0;
                const question = firstMarket ? firstMarket.question : '';
                const volume = event.volume || 0;
                const endDate = firstMarket ? (firstMarket.end_date || '').split('T')[0] : '';
                
                return `
                    <div class="event-card" onclick="window.location.href='event.html?slug=${event.slug}'">
                        <div class="card-header">
                            <div class="card-title">${escapeHtml(event.title)}</div>
                            ${probability < 10 ? '<div class="card-badge">低概率</div>' : ''}
                        </div>
                        <div class="card-market">
                            <div class="market-question">${escapeHtml(question)}</div>
                            <div class="probability-bar">
                                <div class="probability-fill" style="width:${probability}%">
                                    <span class="probability-text">${probability.toFixed(1)}%</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <div class="volume">${formatNumber(volume)}</div>
                            <div class="date">${endDate || '长期'}</div>
                        </div>
                        <a href="event.html?slug=${event.slug}" class="card-link"></a>
                    </div>
                `;
            }).join('');
        }
        
        // 切换排序
        function changeSort(sort) {
            currentSort = sort;
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.sort === sort);
            });
            renderEvents();
        }
        
        // 过滤事件
        function filterEvents() {
            renderEvents();
        }
        
        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
        
        // 初始化
        loadData();
        
        // 每5分钟自动刷新
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
