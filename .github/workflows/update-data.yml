name: Update Markets Data

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:  # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v3
      with:
        ref: main
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: pip install requests python-dotenv
    
    - name: Create credentials file
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        mkdir -p /home/runner/.hermes/credentials
        echo "OPENAI_API_KEY=$OPENAI_API_KEY" > /home/runner/.hermes/credentials/polymarket-tracker.env
    
    - name: Fetch Polymarket data
      run: python scripts/fetch_polymarket.py
    
    - name: Fetch news from RSS (optional)
      continue-on-error: true
      run: python scripts/fetch_twitter_news.py
    
    - name: Move data to docs
      run: |
        mkdir -p docs/data
        cp data/markets.json docs/data/
    
    - name: Commit and push if changed
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add docs/data/markets.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update markets data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" && git push)
