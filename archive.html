<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive - Tech Predictions Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <div class="container">
        <header>
            <h1>📦 Archive - Closed Markets</h1>
            <div class="controls">
                <a href="index.html" class="archive-btn">← Back to Active Markets</a>
            </div>
        </header>

        <div id="archiveGrid" class="markets-grid"></div>
        
        <div style="text-align: center; margin: 30px 0; color: var(--text-secondary);">
            <p>Archived markets are updated manually. This page shows completed predictions for historical reference.</p>
        </div>
    </div>

    <script>
        // Load and display archived markets
        async function loadArchive() {
            try {
                const response = await fetch('data/archive.json?t=' + new Date().getTime());
                const data = await response.json();
                renderArchive(data.markets || []);
            } catch (error) {
                document.getElementById('archiveGrid').innerHTML = 
                    '<p style="text-align: center; grid-column: 1/-1;">No archived markets yet</p>';
            }
        }

        function renderArchive(markets) {
            const grid = document.getElementById('archiveGrid');
            grid.innerHTML = '';

            if (markets.length === 0) {
                grid.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">No archived markets yet</p>';
                return;
            }

            markets.forEach(market => {
                const card = document.createElement('div');
                card.className = 'market-card';
                card.innerHTML = `
                    <div class="market-question">${market.question}</div>
                    <div class="market-meta">
                        <span>Ended: ${market.endDate}</span>
                        <span>Result: <strong>${market.result || 'TBD'}</strong></span>
                    </div>
                    <div style="margin-top: 10px; padding: 10px; background: var(--bg-secondary); border-radius: 5px;">
                        <strong>Outcome:</strong> ${market.prediction.direction} 
                        (Confidence: ${(market.prediction.confidence * 100).toFixed(0)}%)
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', loadArchive);
    </script>
</body>
</html>
