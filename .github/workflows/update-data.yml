name: Update Markets Data

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests python-dotenv
    
    - name: Create credentials file
      env:
        TWITTER_API_TOKEN: ${{ secrets.TWITTER_API_TOKEN }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p /home/runner/.hermes/credentials
        echo "TWITTER_API_TOKEN=$TWITTER_API_TOKEN" > /home/runner/.hermes/credentials/polymarket-tracker.env
        echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> /home/runner/.hermes/credentials/polymarket-tracker.env
        echo "GITHUB_TOKEN=$GITHUB_TOKEN" >> /home/runner/.hermes/credentials/polymarket-tracker.env
    
    - name: Fetch Polymarket data
      run: python scripts/fetch_polymarket.py
    
    - name: Fetch Twitter news
      run: python scripts/fetch_twitter_news.py
      continue-on-error: true  # Don't fail if Twitter API has issues
    
    - name: Commit and push if changed
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add data/markets.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update markets data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" && git push)
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        enable_jekyll: false
